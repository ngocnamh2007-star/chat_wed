<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Modern Chat</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111827, #1e3a8a);
        }

        .app {
            width: 1050px;
            height: 650px;
            margin: 35px auto;
            background: white;
            border-radius: 25px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }

        .sidebar {
            width: 300px;
            background: #111827;
            color: white;
            padding: 22px;
        }

        .profile {
            background: #1f2937;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .profile b {
            color: #60a5fa;
        }

        .user {
            display: block;
            padding: 13px 15px;
            margin-bottom: 10px;
            background: #1f2937;
            color: white;
            text-decoration: none;
            border-radius: 14px;
        }

        .user:hover, .active {
            background: #2563eb;
        }

        .logout {
            display: block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            background: #374151;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .delete-account {
            width: 100%;
            margin-top: 10px;
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f3f4f6;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .chat-header h3 {
            margin: 0;
        }

        .search-box input {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            outline: none;
        }

        .messages {
            flex: 1;
            padding: 22px;
            overflow-y: auto;
        }

        .msg {
            max-width: 65%;
            padding: 12px 15px;
            margin-bottom: 14px;
            border-radius: 18px;
            clear: both;
            word-wrap: break-word;
        }

        .me {
            float: right;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other {
            float: left;
            background: white;
            color: #111827;
            border-bottom-left-radius: 4px;
        }

        .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 6px;
        }

        .actions {
            margin-top: 7px;
            display: flex;
            gap: 6px;
        }

        .actions button {
            font-size: 11px;
            border: none;
            border-radius: 8px;
            padding: 5px 8px;
            cursor: pointer;
        }

        .delete-msg {
            background: #f97316;
            color: white;
        }

        .recall-msg {
            background: #ef4444;
            color: white;
        }

        .send-form {
            display: flex;
            gap: 10px;
            padding: 18px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .send-form input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            outline: none;
        }

        .send-form button {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            margin-top: 250px;
            color: #6b7280;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="app">
    <div class="sidebar">
        <h2>Chat App</h2>

        <div class="profile">
            Tài khoản:<br>
            <b>{{ username }}</b>
        </div>

        <h3>Người dùng</h3>

        {% for user in users %}
            <a class="user {% if selected_user == user['username'] %}active{% endif %}"
               href="/chat?user={{ user['username'] }}">
                {{ user['username'] }}
            </a>
        {% endfor %}

        <a class="logout" href="/logout">Đăng xuất</a>

        <form method="POST" action="/delete_account"
              onsubmit="return confirm('Bạn có chắc muốn xoá tài khoản này không?');">
            <button class="delete-account" type="submit">Xoá tài khoản</button>
        </form>
    </div>

    <div class="chat-area">
        {% if selected_user %}
            <div class="chat-header">
                <h3>Đang nhắn với: {{ selected_user }}</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm tin nhắn...">
                </div>
            </div>

            <div class="messages" id="messages"></div>

            <form class="send-form" id="sendForm">
                <input type="hidden" id="receiver" value="{{ selected_user }}">
                <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." autocomplete="off" required>
                <button type="submit">Gửi</button>
            </form>
        {% else %}
            <div class="empty">Chọn một tài khoản bên trái để bắt đầu nhắn tin</div>
        {% endif %}
    </div>
</div>

<script>
    const currentUser = "{{ username }}";
    const selectedUser = "{{ selected_user }}";
    const messagesBox = document.getElementById("messages");
    const sendForm = document.getElementById("sendForm");
    const messageInput = document.getElementById("messageInput");
    const searchInput = document.getElementById("searchInput");

    let lastContent = "";

    function loadMessages() {
        if (!selectedUser || !messagesBox) return;

        const keyword = searchInput ? searchInput.value : "";

        fetch(`/get_messages?user=${selectedUser}&keyword=${encodeURIComponent(keyword)}`)
            .then(response => response.json())
            .then(data => {
                let html = "";

                data.forEach(msg => {
                    const isMe = msg.sender === currentUser;

                    html += `
                        <div class="msg ${isMe ? "me" : "other"}">
                            <div>${msg.message}</div>
                            <div class="time">${msg.created_at}</div>

                            <div class="actions">
                                <button class="delete-msg" onclick="deleteMessage(${msg.id})">Xoá</button>

                                ${isMe && msg.recalled === 0 ? `
                                    <button class="recall-msg" onclick="recallMessage(${msg.id})">Thu hồi</button>
                                ` : ""}
                            </div>
                        </div>
                    `;
                });

                if (html !== lastContent) {
                    messagesBox.innerHTML = html;
                    messagesBox.scrollTop = messagesBox.scrollHeight;
                    lastContent = html;
                }
            });
    }

    if (sendForm) {
        sendForm.addEventListener("submit", function(e) {
            e.preventDefault();

            const formData = new FormData();
            formData.append("receiver", selectedUser);
            formData.append("message", messageInput.value);

            fetch("/send_message", {
                method: "POST",
                body: formData
            }).then(() => {
                messageInput.value = "";
                loadMessages();
            });
        });
    }

    function deleteMessage(messageId) {
        if (!confirm("Bạn muốn xoá tin nhắn này khỏi phía bạn?")) return;

        const formData = new FormData();
        formData.append("message_id", messageId);

        fetch("/delete_message", {
            method: "POST",
            body: formData
        }).then(() => {
            loadMessages();
        });
    }

    function recallMessage(messageId) {
        if (!confirm("Bạn muốn thu hồi tin nhắn này với cả hai người?")) return;

        const formData = new FormData();
        formData.append("message_id", messageId);

        fetch("/recall_message", {
            method: "POST",
            body: formData
        }).then(() => {
            loadMessages();
        });
    }

    if (searchInput) {
        searchInput.addEventListener("input", loadMessages);
    }

    loadMessages();
    setInterval(loadMessages, 1000);
</script>

</body>
</html>
